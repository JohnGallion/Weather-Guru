<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <title>Weather Guru</title>
</head>
<body>
    <div class="row">
        <div class="col">
          
        </div>
        <div class="col-4">
            <div class="input-group mb-3">
                <input type="text" class="form-control" id="city" placeholder="City" aria-label="City" aria-describedby="button-addon2">
                <button class="btn btn-outline-secondary" type="button" onclick="getCoordinates()" >Search</button>
            </div>
        </div>
        <div class="col">
            <table class="table">
                <thead>
                  <tr>
                    <th scope="col">City</th>
                    <th scope="col">Longitude</th>
                    <th scope="col">Latitude</th>
                  </tr>
                </thead>
                <tbody id="table-contents"class="table-info">
                 
                </tbody>
              </table>
        </div>
      </div>
    </div>
  
      
    <script src="/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
</body>
</html>
